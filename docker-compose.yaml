services:
  db:
    image: postgres:18-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_USER=pd
      - POSTGRES_PASSWORD=pdnotes
      - POSTGRES_DB=notespd
    ports:
      - "5431:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pd -d notespd" ]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./apps/server
    container_name: express_server
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./apps/client
    container_name: react_client
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - server

volumes:
  pgdata:

